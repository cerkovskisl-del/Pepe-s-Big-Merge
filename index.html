<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe's Big Merge - Fixed Hitboxes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f14;
            --panel-bg: #141b24;
            --pepe-green: #4caf50;
            --neon-glow: #39ff14;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #header-panel {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 32px;
            margin: 0 0 10px 0;
            color: var(--pepe-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .stats-container {
            display: flex;
            gap: 20px;
            background: var(--panel-bg);
            padding: 10px 25px;
            border-radius: 12px;
            border: 1px solid #233243;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #7f93a7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-color);
        }

        #next-name {
            color: var(--neon-glow);
        }

        #game-wrapper {
            position: relative;
            padding: 10px;
            background: radial-gradient(circle, #17222e 0%, #0b0f14 100%);
            border-radius: 20px;
            border: 2px solid #1f2d3d;
        }

        #game-container {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
        }

        /* Evolūcijas josla apakšā */
        #evolution-path {
            margin-top: 20px;
            background: var(--panel-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #233243;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 450px;
            overflow-x: auto;
        }

        .evo-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            min-width: 65px;
            text-align: center;
        }

        .evo-img {
            width: 35px;
            height: 35px;
            object-fit: contain;
            margin-bottom: 4px;
        }

        .evo-arrow {
            color: #4f6780;
            font-weight: bold;
        }

        #danger-line {
            position: absolute;
            top: 110px;
            left: 10px;
            width: 450px;
            height: 2px;
            background: repeating-linear-gradient(90deg, #ff3333, #ff3333 10px, transparent 10px, transparent 20px);
            opacity: 0.6;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="header-panel">
        <h1>Pepe's Big Merge</h1>
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">Punkti</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box" style="border-left: 1px solid #233243; border-right: 1px solid #233243; padding: 0 20px;">
                <div class="stat-label">Nākamais Pepe</div>
                <div id="next-name" class="stat-value">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Labākais Rezultāts</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="danger-line"></div>
        <div id="game-container"></div>
    </div>

    <div id="evolution-path"></div>

    <script>
        const WIDTH = 450;
        const HEIGHT = 650;
        
        // Atjaunoti izmēri (rādiusi), lai tie perfekti atbilstu bildes proporcijām
        const EVOLUTION_LEVELS = [
            { size: 24, score: 2, name: 'Kurkulis', img: 'pepe1.png', color: 'rgba(139, 195, 74, 0.15)' },
            { size: 34, score: 4, name: 'Krupis', img: 'pepe2.png', color: 'rgba(76, 175, 80, 0.15)' },
            { size: 46, score: 8, name: 'Sad Pepe', img: 'pepe3.png', color: 'rgba(33, 150, 243, 0.15)' },
            { size: 58, score: 16, name: 'Chad Pepe', img: 'pepe4.png', color: 'rgba(0, 188, 212, 0.15)' },
            { size: 74, score: 32, name: 'Monk Pepe', img: 'pepe5.png', color: 'rgba(156, 39, 176, 0.15)' },
            { size: 94, score: 64, name: 'Giga Chad', img: 'pepe6.png', color: 'rgba(244, 67, 54, 0.15)' }
        ];

        let highScore = localStorage.getItem('pepe_highscore') || 0;
        document.getElementById('high-score').innerText = highScore;

        // Izveidojam vizuālo ceļvedi apakšā
        const evoPathContainer = document.getElementById('evolution-path');
        EVOLUTION_LEVELS.forEach((lvl, idx) => {
            const step = document.createElement('div');
            step.className = 'evo-step';
            step.innerHTML = `
                <img class="evo-img" src="${lvl.img}" onerror="this.style.display='none';">
                <div style="color:#a1b5cc; font-weight:600;">${lvl.name}</div>
            `;
            evoPathContainer.appendChild(step);
            if (idx < EVOLUTION_LEVELS.length - 1) {
                const arrow = document.createElement('div');
                arrow.className = 'evo-arrow';
                arrow.innerText = '➔';
                evoPathContainer.appendChild(arrow);
            }
        });

        const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
        const engine = Engine.create({ gravity: { y: 1.2 } });
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: WIDTH,
                height: HEIGHT,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const wallOptions = { isStatic: true, render: { fillStyle: '#1f2d3d' } };
        const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 10, WIDTH, 20, wallOptions);
        const leftWall = Bodies.rectangle(10, HEIGHT / 2, 20, HEIGHT, wallOptions);
        const rightWall = Bodies.rectangle(WIDTH - 10, HEIGHT / 2, 20, HEIGHT, wallOptions);
        Composite.add(world, [ground, leftWall, rightWall]);

        let score = 0;
        let currentNextIndex = Math.floor(Math.random() * 2); 
        let canDrop = true;

        updateNextPreview();

        function updateNextPreview() {
            const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
            document.getElementById('next-name').innerText = nextLvl.name;
        }

        function createMeme(x, y, index) {
            const level = EVOLUTION_LEVELS[index];
            const targetWidth = level.size * 2;
            
            const meme = Bodies.circle(x, y, level.size, {
                restitution: 0.2,
                friction: 0.1,
                label: 'pepe',
                plugin: { levelIndex: index, color: level.color },
                render: {
                    sprite: {
                        texture: level.img,
                        xScale: targetWidth / 300, // Sākotnējais minējums līdz bilde ielādējas
                        yScale: targetWidth / 300
                    }
                }
            });

            // Šis pārrēķina precīzu mērogu neatkarīgi no tā, cik liels vai mazs ir pats PNG fails
            const imgObj = new Image();
            imgObj.src = level.img;
            imgObj.onload = function() {
                // Atrod lielāko malas izmēru, lai bilde smuki ierakstītos aplī
                const maxDimension = Math.max(this.width, this.height);
                meme.render.sprite.xScale = targetWidth / maxDimension;
                meme.render.sprite.yScale = targetWidth / maxDimension;
            };

            return meme;
        }

        // Papildus vizuālais slānis: uzzīmē vieglu apli apkārt tēlam, lai redzētu precīzu fizikas zonu
        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const bodies = Composite.allBodies(world);

            bodies.forEach(body => {
                if (body.label === 'pepe') {
                    const index = body.plugin.levelIndex;
                    const size = EVOLUTION_LEVELS[index].size;
                    const color = body.plugin.color;

                    context.save();
                    context.beginPath();
                    context.arc(body.position.x, body.position.y, size, 0, 2 * Math.PI);
                    context.fillStyle = color;
                    context.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    context.lineWidth = 1;
                    context.fill();
                    context.stroke();
                    context.restore();
                }
            });
        });

        document.getElementById('game-container').addEventListener('click', (event) => {
            if (!canDrop) return;

            const rect = event.currentTarget.getBoundingClientRect();
            let clickX = event.clientX - rect.left;

            const currentSize = EVOLUTION_LEVELS[currentNextIndex].size;
            if (clickX < 20 + currentSize) clickX = 20 + currentSize;
            if (clickX > WIDTH - 20 - currentSize) clickX = WIDTH - 20 - currentSize;

            const newMeme = createMeme(clickX, 60, currentNextIndex);
            Composite.add(world, newMeme);

            canDrop = false;
            currentNextIndex = Math.floor(Math.random() * 2); 
            updateNextPreview();

            setTimeout(() => { canDrop = true; }, 400);
        });

        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;

            pairs.forEach((pair) => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;

                if (bodyA.label === 'pepe' && bodyB.label === 'pepe') {
                    const idxA = bodyA.plugin.levelIndex;
                    const idxB = bodyB.plugin.levelIndex;

                    if (idxA === idxB && idxA < EVOLUTION_LEVELS.length - 1) {
                        const midX = (bodyA.position.x + bodyB.position.x) / 2;
                        const midY = (bodyA.position.y + bodyB.position.y) / 2;

                        Composite.remove(world, [bodyA, bodyB]);

                        const nextIdx = idxA + 1;
                        const upgradedMeme = createMeme(midX, midY, nextIdx);

                        score += EVOLUTION_LEVELS[nextIdx].score;
                        document.getElementById('score').innerText = score;

                        if (score > highScore) {
                            highScore = score;
                            document.getElementById('high-score').innerText = highScore;
                            localStorage.setItem('pepe_highscore', highScore);
                        }

                        setTimeout(() => {
                            Composite.add(world, upgradedMeme);
                        }, 15);
                    }
                }
            });
        });

        setInterval(() => {
            const allBodies = Composite.allBodies(world);
            allBodies.forEach(body => {
                if (body.label === 'pepe' && body.position.y < 110 && body.velocity.y < 0.05) {
                    alert("Spēle Beigusies! Tavs rezultāts: " + score);
                    score = 0;
                    document.getElementById('score').innerText = score;
                    
                    const toRemove = allBodies.filter(b => b.label === 'pepe');
                    Composite.remove(world, toRemove);
                }
            });
        }, 1500);

    </script>
</body>
</html>
