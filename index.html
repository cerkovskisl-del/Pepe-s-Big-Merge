<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe's Big Merge - CHAOS STORM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-dark: #020305;
            --panel-bg: rgba(8, 10, 15, 0.95);
            --pepe-green: #39ff14;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-orange: #ffaa00;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 50% 100%, rgba(0, 255, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 0% 0%, rgba(255, 0, 255, 0.05) 0px, transparent 40%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #header-panel {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 30px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
        }

        #event-banner {
            height: 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff3333;
            margin-top: 5px;
            text-shadow: 0 0 8px #ff3333;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stats-container {
            display: flex;
            gap: 10px;
            background: var(--panel-bg);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
        }

        .stat-box {
            text-align: center;
            min-width: 75px;
        }

        .stat-label {
            font-size: 8px;
            color: #5d7185;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
        }

        #score { color: var(--pepe-green); }
        #combo-box { color: var(--neon-orange); text-shadow: 0 0 8px var(--neon-orange); }
        #high-score { color: #ffcc00; }

        #game-wrapper {
            position: relative;
            padding: 6px;
            background: rgba(0, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 35px rgba(0,0,0,0.5);
            transition: transform 0.05s ease;
        }

        #game-container {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: none;
        }

        #evolution-path {
            margin-top: 12px;
            background: var(--panel-bg);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 340px;
            overflow-x: auto;
        }

        .evo-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 8px;
            min-width: 48px;
        }

        .evo-img {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }

        #danger-line {
            position: absolute;
            top: 140px;
            left: 6px;
            width: 340px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0055, transparent);
            box-shadow: 0 0 10px #ff0055;
            z-index: 10;
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(-3px, 2px); }
            50% { transform: translate(3px, -2px); }
            75% { transform: translate(-2px, -1px); }
            100% { transform: translate(0,0); }
        }
        .shake { animation: shake 0.12s linear infinite; }
    </style>
</head>
<body>

    <div id="header-panel">
        <h1>Pepe's Chaos Storm</h1>
        <div id="event-banner">GRAVITĀCIJAS ANOMĀLIJA!</div>
        <div class="stats-container" style="margin-top: 5px;">
            <div class="stat-box">
                <div class="stat-label">Punkti</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box" style="border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08); padding: 0 10px;">
                <div class="stat-label">Combo</div>
                <div id="combo-box" class="stat-value">x1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Labākais</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="danger-line"></div>
        <div id="game-container"></div>
    </div>

    <div id="evolution-path"></div>

    <script>
        const WIDTH = 340;
        const HEIGHT = 620;
        
        const EVOLUTION_LEVELS = [
            { size: 20, score: 2, name: 'Kurkulis', img: 'pepe1.png', color: '#39ff14', glow: 'rgba(57, 255, 20, 0.15)' },
            { size: 28, score: 4, name: 'Krupis', img: 'pepe2.png', color: '#00ffff', glow: 'rgba(0, 255, 255, 0.15)' },
            { size: 38, score: 8, name: 'Sad Pepe', img: 'pepe3.png', color: '#ff00ff', glow: 'rgba(255, 0, 255, 0.15)' },
            { size: 50, score: 16, name: 'Chad Pepe', img: 'pepe4.png', color: '#ffaa00', glow: 'rgba(255, 170, 0, 0.15)' },
            { size: 66, score: 32, name: 'Monk Pepe', img: 'pepe5.png', color: '#b026ff', glow: 'rgba(176, 38, 255, 0.15)' },
            { size: 84, score: 64, name: 'Giga Chad', img: 'pepe6.png', color: '#ff2a00', glow: 'rgba(255, 42, 0, 0.2)' }
        ];

        let highScore = localStorage.getItem('pepe_highscore') || 0;
        document.getElementById('high-score').innerText = highScore;

        const evoPathContainer = document.getElementById('evolution-path');
        EVOLUTION_LEVELS.forEach((lvl) => {
            const step = document.createElement('div');
            step.className = 'evo-step';
            step.innerHTML = `<img class="evo-img" src="${lvl.img}" onerror="this.style.opacity='0.4';">`;
            evoPathContainer.appendChild(step);
        });

        const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;
        const engine = Engine.create({ gravity: { y: 1.4, x: 0 } });
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: { width: WIDTH, height: HEIGHT, wireframes: false, background: '#05070a' }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const wallOptions = { isStatic: true, friction: 0.02, render: { fillStyle: '#0d1117' } };
        const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 6, WIDTH, 12, wallOptions);
        const leftWall = Bodies.rectangle(6, HEIGHT / 2, 12, HEIGHT, wallOptions);
        const rightWall = Bodies.rectangle(WIDTH - 6, HEIGHT / 2, 12, HEIGHT, wallOptions);
        Composite.add(world, [ground, leftWall, rightWall]);

        let score = 0;
        let currentNextIndex = Math.floor(Math.random() * 4); 
        let canDrop = true;
        let mouseX = WIDTH / 2;
        
        let comboCount = 0;
        let lastMergeTime = 0;

        // HAOSS: Sānu anomāliju taimeris
        setInterval(() => {
            const r = Math.random();
            const banner = document.getElementById('event-banner');
            
            if (r < 0.4) {
                // Vējš pa kreisi
                engine.gravity.x = -0.4;
                banner.innerText = "🌀 SĀNU VĒJŠ: PA KREISI!";
                banner.style.color = "var(--neon-cyan)";
                banner.style.opacity = 1;
            } else if (r < 0.8) {
                // Vējš pa labi
                engine.gravity.x = 0.4;
                banner.innerText = "🌀 SĀNU VĒJŠ: PA LABI!";
                banner.style.color = "var(--neon-magenta)";
                banner.style.opacity = 1;
            } else {
                // Anti-gravitācija (viss kļūst viegls uz sekundi)
                engine.gravity.y = 0.3;
                banner.innerText = "🎈 ZERO GRAVITY ANOMĀLIJA!";
                banner.style.color = "var(--neon-orange)";
                banner.style.opacity = 1;
            }

            setTimeout(() => {
                engine.gravity.x = 0;
                engine.gravity.y = 1.4;
                banner.style.opacity = 0;
            }, 3000); // Anomālija ilgst 3 sekundes

        }, 14000);

        function createMeme(x, y, index) {
            const level = EVOLUTION_LEVELS[index];
            const targetWidth = level.size * 2;
            
            const meme = Bodies.circle(x, y, level.size, {
                restitution: 0.3,
                friction: 0.04,
                density: 0.01 * (index + 1),
                label: 'pepe',
                plugin: { levelIndex: index, color: level.color, glow: level.glow },
                render: { sprite: { texture: level.img, xScale: targetWidth/250, yScale: targetWidth/250 } }
            });

            const imgObj = new Image();
            imgObj.src = level.img;
            imgObj.onload = function() {
                const maxDimension = Math.max(this.width, this.height);
                meme.render.sprite.xScale = targetWidth / maxDimension;
                meme.render.sprite.yScale = targetWidth / maxDimension;
            };
            return meme;
        }

        document.getElementById('game-container').addEventListener('mousemove', (event) => {
            const rect = event.currentTarget.getBoundingClientRect();
            mouseX = event.clientX - rect.left;
            const currentSize = EVOLUTION_LEVELS[currentNextIndex].size;
            if (mouseX < 12 + currentSize) mouseX = 12 + currentSize;
            if (mouseX > WIDTH - 12 - currentSize) mouseX = WIDTH - 12 - currentSize;
        });

        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const bodies = Composite.allBodies(world);

            if (canDrop) {
                const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
                context.save();
                context.beginPath();
                context.setLineDash([2, 4]);
                context.moveTo(mouseX, 80);
                context.lineTo(mouseX, HEIGHT - 12);
                context.strokeStyle = 'rgba(0, 255, 255, 0.2)';
                context.stroke();
                
                context.beginPath();
                context.arc(mouseX, 80, nextLvl.size, 0, 2 * Math.PI);
                context.fillStyle = nextLvl.glow;
                context.strokeStyle = nextLvl.color;
                context.fill();
                context.stroke();
                context.restore();
            }

            bodies.forEach(body => {
                if (body.label === 'pepe') {
                    const index = body.plugin.levelIndex;
                    const size = EVOLUTION_LEVELS[index].size;
                    context.save();
                    context.beginPath();
                    context.arc(body.position.x, body.position.y, size - 1, 0, 2 * Math.PI);
                    context.fillStyle = body.plugin.glow;
                    context.strokeStyle = body.plugin.color;
                    context.lineWidth = 2;
                    context.fill();
                    context.stroke();
                    context.restore();
                }
            });
        });

        document.getElementById('game-container').addEventListener('click', () => {
            if (!canDrop) return;
            const newMeme = createMeme(mouseX, 80, currentNextIndex);
            Body.setAngularVelocity(newMeme, (Math.random() - 0.5) * 0.2);
            Composite.add(world, newMeme);

            canDrop = false;
            currentNextIndex = Math.floor(Math.random() * 4);
            document.getElementById('next-name').innerText = EVOLUTION_LEVELS[currentNextIndex].name;
            document.getElementById('next-name').style.color = EVOLUTION_LEVELS[currentNextIndex].color;

            setTimeout(() => { canDrop = true; }, 280);
        });

        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;

            pairs.forEach((pair) => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;

                if (bodyA.label === 'pepe' && bodyB.label === 'pepe') {
                    const idxA = bodyA.plugin.levelIndex;
                    const idxB = bodyB.plugin.levelIndex;

                    if (idxA === idxB && idxA < EVOLUTION_LEVELS.length - 1) {
                        const midX = (bodyA.position.x + bodyB.position.x) / 2;
                        const midY = (bodyA.position.y + bodyB.position.y) / 2;

                        Composite.remove(world, [bodyA, bodyB]);

                        const nextIdx = idxA + 1;
                        const upgradedMeme = createMeme(midX, midY, nextIdx);

                        // COMBO SISTĒMA
                        const now = Date.now();
                        if (now - lastMergeTime < 2500) {
                            comboCount++;
                        } else {
                            comboCount = 1;
                        }
                        lastMergeTime = now;
                        document.getElementById('combo-box').innerText = "x" + comboCount;

                        // KRITISKAIS SPRĀDZIENS: liela apvienošanās pagrūž pārējos objektus prom
                        if (nextIdx >= 3) {
                            const allBodies = Composite.allBodies(world);
                            allBodies.forEach(b => {
                                if (b.label === 'pepe') {
                                    const forceVec = Vector.sub(b.position, {x: midX, y: midY});
                                    const dist = Vector.magnitude(forceVec);
                                    if (dist < 120 && dist > 0) {
                                        const pushMultiplier = 0.005 * (comboCount);
                                        Body.applyForce(b, b.position, {
                                            x: (forceVec.x / dist) * pushMultiplier,
                                            y: -0.003
                                        });
                                    }
                                }
                            });
                            // Ekrāna kratīšana
                            const wrapper = document.getElementById('game-wrapper');
                            wrapper.classList.add('shake');
                            setTimeout(() => wrapper.classList.remove('shake'), 150);
                        }

                        score += EVOLUTION_LEVELS[nextIdx].score * comboCount;
                        document.getElementById('score').innerText = score;

                        if (score > highScore) {
                            highScore = score;
                            document.getElementById('high-score').innerText = highScore;
                            localStorage.setItem('pepe_highscore', highScore);
                        }

                        setTimeout(() => { Composite.add(world, upgradedMeme); }, 10);
                    }
                }
            });
        });

        // Taimeris zaudēšanai
        setInterval(() => {
            const allBodies = Composite.allBodies(world);
            allBodies.forEach(body => {
                if (body.label === 'pepe' && body.position.y < 140 && body.velocity.y < 0.02) {
                    alert("CHAOS OVERCOAT! Rezultāts: " + score);
                    score = 0;
                    comboCount = 1;
                    document.getElementById('score').innerText = score;
                    document.getElementById('combo-box').innerText = "x1";
                    Composite.remove(world, allBodies.filter(b => b.label === 'pepe'));
                }
            });
        }, 700);

    </script>
</body>
</html>
