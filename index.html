<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe's Big Merge - Arcade Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-dark: #080c10;
            --panel-bg: rgba(20, 27, 36, 0.85);
            --border-glow: #1f2d3d;
            --pepe-green: #39ff14;
            --neon-blue: #00f0ff;
            --neon-pink: #ff0055;
            --neon-purple: #b026ff;
            --text-main: #ffffff;
            --text-muted: #7f93a7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(57, 255, 20, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 240, 255, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #header-panel {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            margin: 0 0 15px 0;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--pepe-green), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.3));
        }

        .stats-container {
            display: flex;
            gap: 15px;
            background: var(--panel-bg);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .stat-box {
            text-align: center;
            min-width: 90px;
            transition: transform 0.2s ease;
        }

        .stat-box.pulse {
            transform: scale(1.1);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        #score { color: var(--pepe-green); }
        #next-name { color: var(--neon-blue); }
        #high-score { color: #ffcc00; }

        #game-wrapper {
            position: relative;
            padding: 8px;
            background: rgba(31, 45, 61, 0.3);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #game-container {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            cursor: none; /* Paslēpj parasto peli virs spēles, jo mums būs lāzera tēmēklis */
        }

        /* Evolūcijas josla apakšā */
        #evolution-path {
            margin-top: 20px;
            background: var(--panel-bg);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 460px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .evo-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            min-width: 62px;
            text-align: center;
            opacity: 0.7;
            transition: opacity 0.3s, transform 0.3s;
        }

        .evo-step:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        .evo-img {
            width: 38px;
            height: 38px;
            object-fit: contain;
            margin-bottom: 6px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .evo-name {
            color: #a1b5cc;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .evo-arrow {
            color: var(--text-muted);
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(255,255,255,0.1);
        }

        #danger-line {
            position: absolute;
            top: 110px;
            left: 8px;
            width: 450px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
            box-shadow: 0 0 8px var(--neon-pink);
            opacity: 0.8;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="header-panel">
        <h1>Pepe's Big Merge</h1>
        <div class="stats-container">
            <div class="stat-box" id="score-box">
                <div class="stat-label">Punkti</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box" style="border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08); padding: 0 15px; min-width: 130px;">
                <div class="stat-label">Nākamais</div>
                <div id="next-name" class="stat-value">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Labākais</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="danger-line"></div>
        <div id="game-container"></div>
    </div>

    <div id="evolution-path"></div>

    <script>
        const WIDTH = 450;
        const HEIGHT = 650;
        
        // Konfigurācija ar perfekti piemeklētām neona krāsām katram līmenim
        const EVOLUTION_LEVELS = [
            { size: 24, score: 2, name: 'Kurkulis', img: 'pepe1.png', color: '#39ff14', glow: 'rgba(57, 255, 20, 0.25)' },
            { size: 34, score: 4, name: 'Krupis', img: 'pepe2.png', color: '#00f0ff', glow: 'rgba(0, 240, 255, 0.25)' },
            { size: 46, score: 8, name: 'Sad Pepe', img: 'pepe3.png', color: '#ff0055', glow: 'rgba(255, 0, 85, 0.25)' },
            { size: 58, score: 16, name: 'Chad Pepe', img: 'pepe4.png', color: '#ffcc00', glow: 'rgba(255, 204, 0, 0.25)' },
            { size: 74, score: 32, name: 'Monk Pepe', img: 'pepe5.png', color: '#b026ff', glow: 'rgba(176, 38, 255, 0.25)' },
            { size: 94, score: 64, name: 'Giga Chad', img: 'pepe6.png', color: '#ff5500', glow: 'rgba(255, 85, 0, 0.3)' }
        ];

        let highScore = localStorage.getItem('pepe_highscore') || 0;
        document.getElementById('high-score').innerText = highScore;

        // Izveidojam vizuālo ceļvedi apakšā
        const evoPathContainer = document.getElementById('evolution-path');
        EVOLUTION_LEVELS.forEach((lvl, idx) => {
            const step = document.createElement('div');
            step.className = 'evo-step';
            step.innerHTML = `
                <img class="evo-img" src="${lvl.img}" onerror="this.style.opacity='0.5';">
                <div class="evo-name" style="color: ${lvl.color}">${lvl.name}</div>
            `;
            evoPathContainer.appendChild(step);
            if (idx < EVOLUTION_LEVELS.length - 1) {
                const arrow = document.createElement('div');
                arrow.className = 'evo-arrow';
                arrow.innerText = '➔';
                evoPathContainer.appendChild(arrow);
            }
        });

        const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
        const engine = Engine.create({ gravity: { y: 1.2 } });
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: WIDTH,
                height: HEIGHT,
                wireframes: false,
                background: '#0d131a'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // Stilīgas plānas konteinera sienas
        const wallOptions = { isStatic: true, render: { fillStyle: '#17222e' } };
        const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 8, WIDTH, 16, wallOptions);
        const leftWall = Bodies.rectangle(8, HEIGHT / 2, 16, HEIGHT, wallOptions);
        const rightWall = Bodies.rectangle(WIDTH - 8, HEIGHT / 2, 16, HEIGHT, wallOptions);
        Composite.add(world, [ground, leftWall, rightWall]);

        let score = 0;
        let currentNextIndex = Math.floor(Math.random() * 2); 
        let canDrop = true;
        let mouseX = WIDTH / 2; // Glabā peles pozīciju mērķēšanai

        updateNextPreview();

        function updateNextPreview() {
            const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
            const nameDiv = document.getElementById('next-name');
            nameDiv.innerText = nextLvl.name;
            nameDiv.style.color = nextLvl.color;
            nameDiv.style.textShadow = `0 0 10px ${nextLvl.glow}`;
        }

        function createMeme(x, y, index) {
            const level = EVOLUTION_LEVELS[index];
            const targetWidth = level.size * 2;
            
            const meme = Bodies.circle(x, y, level.size, {
                restitution: 0.2,
                friction: 0.1,
                label: 'pepe',
                plugin: { levelIndex: index, color: level.color, glow: level.glow },
                render: {
                    sprite: {
                        texture: level.img,
                        xScale: targetWidth / 250, 
                        yScale: targetWidth / 250
                    }
                }
            });

            // Precīza mēroga kalkulācija
            const imgObj = new Image();
            imgObj.src = level.img;
            imgObj.onload = function() {
                const maxDimension = Math.max(this.width, this.height);
                meme.render.sprite.xScale = targetWidth / maxDimension;
                meme.render.sprite.yScale = targetWidth / maxDimension;
            };

            return meme;
        }

        // Peles kustības uztveršana mērķēšanas gidam
        document.getElementById('game-container').addEventListener('mousemove', (event) => {
            const rect = event.currentTarget.getBoundingClientRect();
            mouseX = event.clientX - rect.left;
            
            // Ierobežojam peli, lai bumba neizietu ārpus sienām pirms metiena
            const currentSize = EVOLUTION_LEVELS[currentNextIndex].size;
            if (mouseX < 16 + currentSize) mouseX = 16 + currentSize;
            if (mouseX > WIDTH - 16 - currentSize) mouseX = WIDTH - 16 - currentSize;
        });

        // Uzlabotā zīmēšana ar līniju un neona efektiem
        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const bodies = Composite.allBodies(world);

            // 1. Uzzīmējam mērķēšanas gidu (Lāzera staru un caurspīdīgu priekšskatījumu)
            if (canDrop) {
                const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
                
                context.save();
                // Vertikālā tēmēšanas līnija
                context.beginPath();
                context.setLineDash([6, 6]);
                context.moveTo(mouseX, 60);
                context.lineTo(mouseX, HEIGHT - 16);
                context.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                context.lineWidth = 1.5;
                context.stroke();
                
                // Caurspīdīgs aplis vietā, kur tiks nomesta bumba
                context.beginPath();
                context.arc(mouseX, 60, nextLvl.size, 0, 2 * Math.PI);
                context.fillStyle = nextLvl.glow;
                context.strokeStyle = nextLvl.color;
                context.lineWidth = 2;
                context.fill();
                context.stroke();
                context.restore();
            }

            // 2. Uzzīmējam neona spīduma apļus aiz ripojošajiem tēliem
            bodies.forEach(body => {
                if (body.label === 'pepe') {
                    const index = body.plugin.levelIndex;
                    const size = EVOLUTION_LEVELS[index].size;
                    const color = body.plugin.color;
                    const glow = body.plugin.glow;

                    context.save();
                    context.beginPath();
                    context.arc(body.position.x, body.position.y, size - 1, 0, 2 * Math.PI);
                    
                    // Izveidojam gradientu krāšņākam spīdumam
                    context.fillStyle = glow;
                    context.strokeStyle = color;
                    context.lineWidth = 3;
                    context.shadowBlur = 12;
                    context.shadowColor = color;
                    
                    context.fill();
                    context.stroke();
                    context.restore();
                }
            });
        });

        // Klikšķis lai nomestu
        document.getElementById('game-container').addEventListener('click', () => {
            if (!canDrop) return;

            const newMeme = createMeme(mouseX, 60, currentNextIndex);
            Composite.add(world, newMeme);

            canDrop = false;
            currentNextIndex = Math.floor(Math.random() * 2); 
            updateNextPreview();

            // Pēc 400ms atļaujam mest nākamo
            setTimeout(() => { canDrop = true; }, 400);
        });

        // Sadursmes un apvienošanās
        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;

            pairs.forEach((pair) => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;

                if (bodyA.label === 'pepe' && bodyB.label === 'pepe') {
                    const idxA = bodyA.plugin.levelIndex;
                    const idxB = bodyB.plugin.levelIndex;

                    if (idxA === idxB && idxA < EVOLUTION_LEVELS.length - 1) {
                        const midX = (bodyA.position.x + bodyB.position.x) / 2;
                        const midY = (bodyA.position.y + bodyB.position.y) / 2;

                        Composite.remove(world, [bodyA, bodyB]);

                        const nextIdx = idxA + 1;
                        const upgradedMeme = createMeme(midX, midY, nextIdx);

                        // Rezultāta animācija un palielināšana
                        score += EVOLUTION_LEVELS[nextIdx].score;
                        const scoreDiv = document.getElementById('score');
                        const scoreBox = document.getElementById('score-box');
                        scoreDiv.innerText = score;
                        
                        scoreBox.classList.add('pulse');
                        setTimeout(() => scoreBox.classList.remove('pulse'), 200);

                        if (score > highScore) {
                            highScore = score;
                            document.getElementById('high-score').innerText = highScore;
                            localStorage.setItem('pepe_highscore', highScore);
                        }

                        setTimeout(() => {
                            Composite.add(world, upgradedMeme);
                        }, 15);
                    }
                }
            });
        });

        // Zaudēšanas pārbaude (Sarkanā līnija)
        setInterval(() => {
            const allBodies = Composite.allBodies(world);
            allBodies.forEach(body => {
                if (body.label === 'pepe' && body.position.y < 110 && body.velocity.y < 0.05) {
                    alert("Spēle Beigusies! Tavs episkais rezultāts: " + score);
                    score = 0;
                    document.getElementById('score').innerText = score;
                    
                    const toRemove = allBodies.filter(b => b.label === 'pepe');
                    Composite.remove(world, toRemove);
                }
            });
        }, 1500);

    </script>
</body>
</html>
