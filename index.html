<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe's Big Merge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f14;
            --panel-bg: #141b24;
            --pepe-green: #4caf50;
            --neon-glow: #39ff14;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #header-panel {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            color: var(--pepe-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .stats-container {
            display: flex;
            gap: 15px;
            background: var(--panel-bg);
            padding: 8px 20px;
            border-radius: 12px;
            border: 1px solid #233243;
        }

        .stat-box {
            text-align: center;
            min-width: 90px;
        }

        .stat-label {
            font-size: 10px;
            color: #7f93a7;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }

        #next-name {
            color: var(--neon-glow);
        }

        #game-wrapper {
            position: relative;
            padding: 8px;
            background: radial-gradient(circle, #17222e 0%, #0b0f14 100%);
            border-radius: 20px;
            border: 2px solid #1f2d3d;
        }

        #game-container {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background-color: #11161c;
        }

        /* Evolūcijas josla apakšā */
        #evolution-path {
            margin-top: 15px;
            background: var(--panel-bg);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #233243;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 450px;
            overflow-x: auto;
        }

        .evo-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            min-width: 65px;
            text-align: center;
        }

        .evo-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-bottom: 4px;
            border: 1px solid #fff;
        }

        .evo-arrow {
            color: #4f6780;
            font-weight: bold;
        }

        #danger-line {
            position: absolute;
            top: 110px;
            left: 8px;
            width: 450px;
            height: 2px;
            background: repeating-linear-gradient(90deg, #ff3333, #ff3333 10px, transparent 10px, transparent 20px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="header-panel">
        <h1>Pepe's Big Merge</h1>
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">Punkti</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box" style="border-left: 1px solid #233243; border-right: 1px solid #233243; padding: 0 10px; min-width: 140px;">
                <div class="stat-label">Nākamais</div>
                <div id="next-name" class="stat-value">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Labākais</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="danger-line"></div>
        <div id="game-container"></div>
    </div>

    <div id="evolution-path"></div>

    <script>
        const WIDTH = 450;
        const HEIGHT = 630;
        
        // --- TAVI 6 LIETOJAMIE PEPE LĪMEŅI ---
        const EVOLUTION_LEVELS = [
            { size: 22, score: 2,   name: 'Kurkulis',      color: '#8bc34a', textCol: '#000' },
            { size: 32, score: 4,   name: 'Krupis',        color: '#4caf50', textCol: '#fff' },
            { size: 45, score: 8,   name: 'Sad Pepe',      color: '#2e7d32', textCol: '#fff' },
            { size: 60, score: 16,  name: 'Chad Pepe',     color: '#00bcd4', textCol: '#000' },
            { size: 78, score: 32,  name: 'Monk Pepe',     color: '#9c27b0', textCol: '#fff' },
            { size: 98, score: 64,  name: 'Giga Chad',     color: '#f44336', textCol: '#fff' }
        ];

        let highScore = localStorage.getItem('pepe_highscore') || 0;
        document.getElementById('high-score').innerText = highScore;

        // Izveidojam evolūcijas ceļvedi lapas apakšā
        const evoPathContainer = document.getElementById('evolution-path');
        EVOLUTION_LEVELS.forEach((lvl, idx) => {
            const step = document.createElement('div');
            step.className = 'evo-step';
            step.innerHTML = `
                <div class="evo-dot" style="background:${lvl.color};"></div>
                <div style="color:#a1b5cc; font-weight:600;">${lvl.name}</div>
            `;
            evoPathContainer.appendChild(step);
            if (idx < EVOLUTION_LEVELS.length - 1) {
                const arrow = document.createElement('div');
                arrow.className = 'evo-arrow';
                arrow.innerText = '➔';
                evoPathContainer.appendChild(arrow);
            }
        });

        const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
        const engine = Engine.create({ gravity: { y: 1.2 } });
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: WIDTH,
                height: HEIGHT,
                wireframes: false,
                background: '#11161c'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // Trauka sienas
        const wallOptions = { isStatic: true, render: { fillStyle: '#1f2d3d' } };
        const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 10, WIDTH, 20, wallOptions);
        const leftWall = Bodies.rectangle(10, HEIGHT / 2, 20, HEIGHT, wallOptions);
        const rightWall = Bodies.rectangle(WIDTH - 10, HEIGHT / 2, 20, HEIGHT, wallOptions);
        Composite.add(world, [ground, leftWall, rightWall]);

        let score = 0;
        let currentNextIndex = Math.floor(Math.random() * 2); // Nomešanai dod tikai pirmos 2 līmeņus
        let canDrop = true;

        updateNextPreview();

        function updateNextPreview() {
            const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
            document.getElementById('next-name').innerText = nextLvl.name;
            document.getElementById('next-name').style.color = nextLvl.color;
        }

        function createMeme(x, y, index) {
            const level = EVOLUTION_LEVELS[index];
            
            return Bodies.circle(x, y, level.size, {
                restitution: 0.2,
                friction: 0.1,
                label: 'pepe',
                plugin: { levelIndex: index, name: level.name, textColor: level.textCol },
                render: {
                    fillStyle: level.color,
                    strokeStyle: '#ffffff',
                    lineWidth: 3
                }
            });
        }

        // Zīmēšanas loģika: uzraksta Pepe līmeņa nosaukumu virsū katrai bumbai
        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const bodies = Composite.allBodies(world);

            bodies.forEach(body => {
                if (body.label === 'pepe') {
                    const name = body.plugin.name;
                    const textColor = body.plugin.textColor;
                    const index = body.plugin.levelIndex;
                    const size = EVOLUTION_LEVELS[index].size;

                    context.save();
                    context.translate(body.position.x, body.position.y);
                    context.rotate(body.angle);
                    
                    // Izvēlas teksta izmēru atkarībā no bumbas lieluma
                    context.font = `bold ${size * 0.3}px Arial`;
                    context.fillStyle = textColor;
                    context.textAlign = 'center';
                    context.textBaseline = 'middle';
                    context.fillText(name, 0, 0);
                    
                    context.restore();
                }
            });
        });

        // Klikšķis, lai nomestu
        document.getElementById('game-container').addEventListener('click', (event) => {
            if (!canDrop) return;

            const rect = event.currentTarget.getBoundingClientRect();
            let clickX = event.clientX - rect.left;

            const currentSize = EVOLUTION_LEVELS[currentNextIndex].size;
            if (clickX < 20 + currentSize) clickX = 20 + currentSize;
            if (clickX > WIDTH - 20 - currentSize) clickX = WIDTH - 20 - currentSize;

            const newMeme = createMeme(clickX, 60, currentNextIndex);
            Composite.add(world, newMeme);

            canDrop = false;
            currentNextIndex = Math.floor(Math.random() * 2); // Atkal nejaušs kurkulis vai krupis
            updateNextPreview();

            setTimeout(() => { canDrop = true; }, 400);
        });

        // Apvienošanās loģika (Evolūcija)
        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;

            pairs.forEach((pair) => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;

                if (bodyA.label === 'pepe' && bodyB.label === 'pepe') {
                    const idxA = bodyA.plugin.levelIndex;
                    const idxB = bodyB.plugin.levelIndex;

                    if (idxA === idxB && idxA < EVOLUTION_LEVELS.length - 1) {
                        const midX = (bodyA.position.x + bodyB.position.x) / 2;
                        const midY = (bodyA.position.y + bodyB.position.y) / 2;

                        Composite.remove(world, [bodyA, bodyB]);

                        const nextIdx = idxA + 1;
                        const upgradedMeme = createMeme(midX, midY, nextIdx);

                        score += EVOLUTION_LEVELS[nextIdx].score;
                        document.getElementById('score').innerText = score;

                        if (score > highScore) {
                            highScore = score;
                            document.getElementById('high-score').innerText = highScore;
                            localStorage.setItem('pepe_highscore', highScore);
                        }

                        setTimeout(() => {
                            Composite.add(world, upgradedMeme);
                        }, 15);
                    }
                }
            });
        });

        // Zaudēšanas pārbaude (Sarkanā līnija)
        setInterval(() => {
            const allBodies = Composite.allBodies(world);
            allBodies.forEach(body => {
                if (body.label === 'pepe' && body.position.y < 110 && body.velocity.y < 0.05) {
                    alert("Spēle Beigusies! Rezultāts: " + score);
                    score = 0;
                    document.getElementById('score').innerText = score;
                    
                    const toRemove = allBodies.filter(b => b.label === 'pepe');
                    Composite.remove(world, toRemove);
                }
            });
        }, 1500);

    </script>
</body>
</html>
