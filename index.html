<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe's Big Merge - EXTREME NIGHTMARE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-dark: #030406;
            --panel-bg: rgba(10, 12, 18, 0.95);
            --pepe-green: #39ff14;
            --neon-blue: #00f0ff;
            --neon-red: #ff0000;
            --text-main: #ffffff;
            --text-muted: #4f6174;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 50% 100%, rgba(21fa, 0, 0, 0.12) 0px, transparent 50%),
                radial-gradient(at 50% 0%, rgba(0, 0, 0, 0.8) 0px, transparent 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #header-panel {
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--neon-red), #ff5500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--neon-red));
        }

        .difficulty-badge {
            background: linear-gradient(45deg, #ff0000, #550000);
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            padding: 3px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: inline-block;
            margin-bottom: 8px;
            box-shadow: 0 0 15px var(--neon-red);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stats-container {
            display: flex;
            gap: 10px;
            background: var(--panel-bg);
            padding: 8px 16px;
            border-radius: 12px;
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
        }

        .stat-box {
            text-align: center;
            min-width: 75px;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stat-box.pulse { transform: scale(1.2) rotate(-2deg); }

        .stat-label {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
        }

        #score { color: var(--pepe-green); }
        #next-name { color: var(--neon-blue); }
        #high-score { color: #ffcc00; }

        /* Konteiners ar kratīšanās animācijas klasi */
        #game-wrapper {
            position: relative;
            padding: 6px;
            background: rgba(255, 0, 0, 0.03);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transition: transform 0.05s linear;
        }

        #game-container {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: none;
        }

        #evolution-path {
            margin-top: 15px;
            background: var(--panel-bg);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 340px;
            overflow-x: auto;
        }

        .evo-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 8px;
            min-width: 48px;
        }

        .evo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        #danger-line {
            position: absolute;
            top: 140px; /* Vēl mazāk vietas augšā */
            left: 6px;
            width: 340px;
            height: 2px;
            background: repeating-linear-gradient(90deg, #ff0000, #ff0000 8px, transparent 8px, transparent 16px);
            box-shadow: 0 0 8px #ff0000;
            z-index: 10;
        }

        /* Ekrāna kratīšanās efekts */
        @keyframes shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-4px, 3px); }
            40% { transform: translate(4px, -3px); }
            60% { transform: translate(-3px, -2px); }
            80% { transform: translate(3px, 2px); }
            100% { transform: translate(0, 0); }
        }

        .shake-active {
            animation: shake 0.15s linear infinite;
        }
    </style>
</head>
<body>

    <div id="header-panel">
        <div class="difficulty-badge">NIGHTMARE</div>
        <h1>Pepe's Big Merge</h1>
        <div class="stats-container">
            <div class="stat-box" id="score-box">
                <div class="stat-label">Punkti</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box" style="border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08); padding: 0 8px; min-width: 100px;">
                <div class="stat-label">Nākamais</div>
                <div id="next-name" class="stat-value">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Labākais</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="danger-line"></div>
        <div id="game-container"></div>
    </div>

    <div id="evolution-path"></div>

    <script>
        // EKSTREMTI ŠAURS LAUKUMS: Tikai 340px platums!
        const WIDTH = 340;
        const HEIGHT = 630;
        
        const EVOLUTION_LEVELS = [
            { size: 22, score: 2, name: 'Kurkulis', img: 'pepe1.png', color: '#39ff14', glow: 'rgba(57, 255, 20, 0.15)' },
            { size: 30, score: 4, name: 'Krupis', img: 'pepe2.png', color: '#00f0ff', glow: 'rgba(0, 240, 255, 0.15)' },
            { size: 42, score: 8, name: 'Sad Pepe', img: 'pepe3.png', color: '#ff0055', glow: 'rgba(255, 0, 85, 0.15)' },
            { size: 54, score: 16, name: 'Chad Pepe', img: 'pepe4.png', color: '#ffcc00', glow: 'rgba(255, 204, 0, 0.15)' },
            { size: 68, score: 32, name: 'Monk Pepe', img: 'pepe5.png', color: '#b026ff', glow: 'rgba(176, 38, 255, 0.15)' },
            { size: 86, score: 64, name: 'Giga Chad', img: 'pepe6.png', color: '#ff2a00', glow: 'rgba(255, 42, 0, 0.2)' }
        ];

        let highScore = localStorage.getItem('pepe_highscore') || 0;
        document.getElementById('high-score').innerText = highScore;

        const evoPathContainer = document.getElementById('evolution-path');
        EVOLUTION_LEVELS.forEach((lvl) => {
            const step = document.createElement('div');
            step.className = 'evo-step';
            step.innerHTML = `
                <img class="evo-img" src="${lvl.img}" onerror="this.style.opacity='0.4';">
                <div style="color: ${lvl.color}; font-weight:600; scale: 0.9;">${lvl.name}</div>
            `;
            evoPathContainer.appendChild(step);
        });

        const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
        const engine = Engine.create({ gravity: { y: 1.5 } }); // Ļoti smaga un ātra gravitācija
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: WIDTH,
                height: HEIGHT,
                wireframes: false,
                background: '#040609'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const wallOptions = { isStatic: true, friction: 0.01, render: { fillStyle: '#10151d' } };
        const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 6, WIDTH, 12, wallOptions);
        const leftWall = Bodies.rectangle(6, HEIGHT / 2, 12, HEIGHT, wallOptions);
        const rightWall = Bodies.rectangle(WIDTH - 6, HEIGHT / 2, 12, HEIGHT, wallOptions);
        Composite.add(world, [ground, leftWall, rightWall]);

        let score = 0;
        // BRŪTĀK: Dod nejauši no pirmajiem ČETRIEM līmeņiem (Kurkulis līdz Chad Pepe)
        let currentNextIndex = Math.floor(Math.random() * 4); 
        let canDrop = true;
        let mouseX = WIDTH / 2;

        updateNextPreview();

        function updateNextPreview() {
            const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
            const nameDiv = document.getElementById('next-name');
            nameDiv.innerText = nextLvl.name;
            nameDiv.style.color = nextLvl.color;
        }

        function triggerScreenShake() {
            const wrapper = document.getElementById('game-wrapper');
            wrapper.classList.add('shake-active');
            setTimeout(() => {
                wrapper.classList.remove('shake-active');
            }, 150);
        }

        function createMeme(x, y, index) {
            const level = EVOLUTION_LEVELS[index];
            const targetWidth = level.size * 2;
            
            const meme = Bodies.circle(x, y, level.size, {
                restitution: 0.4, // Augsts atlēciens un lēkāšana
                friction: 0.05,  // Ļoti slidenas bumbas
                density: 0.01 * (index + 1), // Smagākie tēli burtiski saspiež mazākos
                label: 'pepe',
                plugin: { levelIndex: index, color: level.color, glow: level.glow },
                render: {
                    sprite: {
                        texture: level.img,
                        xScale: targetWidth / 250, 
                        yScale: targetWidth / 250
                    }
                }
            });

            const imgObj = new Image();
            imgObj.src = level.img;
            imgObj.onload = function() {
                const maxDimension = Math.max(this.width, this.height);
                meme.render.sprite.xScale = targetWidth / maxDimension;
                meme.render.sprite.yScale = targetWidth / maxDimension;
            };

            return meme;
        }

        document.getElementById('game-container').addEventListener('mousemove', (event) => {
            const rect = event.currentTarget.getBoundingClientRect();
            mouseX = event.clientX - rect.left;
            
            const currentSize = EVOLUTION_LEVELS[currentNextIndex].size;
            if (mouseX < 12 + currentSize) mouseX = 12 + currentSize;
            if (mouseX > WIDTH - 12 - currentSize) mouseX = WIDTH - 12 - currentSize;
        });

        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const bodies = Composite.allBodies(world);

            if (canDrop) {
                const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
                context.save();
                context.beginPath();
                context.setLineDash([3, 5]);
                context.moveTo(mouseX, 80);
                context.lineTo(mouseX, HEIGHT - 12);
                context.strokeStyle = 'rgba(255, 0, 0, 0.25)';
                context.stroke();
                
                context.beginPath();
                context.arc(mouseX, 80, nextLvl.size, 0, 2 * Math.PI);
                context.fillStyle = nextLvl.glow;
                context.strokeStyle = nextLvl.color;
                context.lineWidth = 1;
                context.fill();
                context.stroke();
                context.restore();
            }

            bodies.forEach(body => {
                if (body.label === 'pepe') {
                    const index = body.plugin.levelIndex;
                    const size = EVOLUTION_LEVELS[index].size;
                    const color = body.plugin.color;
                    const glow = body.plugin.glow;

                    context.save();
                    context.beginPath();
                    context.arc(body.position.x, body.position.y, size - 1, 0, 2 * Math.PI);
                    context.fillStyle = glow;
                    context.strokeStyle = color;
                    context.lineWidth = 2;
                    context.fill();
                    context.stroke();
                    context.restore();
                }
            });
        });

        document.getElementById('game-container').addEventListener('click', () => {
            if (!canDrop) return;

            const newMeme = createMeme(mouseX, 80, currentNextIndex);
            
            // Ekstrēma rotācija gaisā
            const extremeAngularVelocity = (Math.random() - 0.5) * 0.35;
            Body.setAngularVelocity(newMeme, extremeAngularVelocity);
            
            Composite.add(world, newMeme);

            canDrop = false;
            currentNextIndex = Math.floor(Math.random() * 4); // Random starp 4 tēliem
            updateNextPreview();

            setTimeout(() => { canDrop = true; }, 300);
        });

        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;

            pairs.forEach((pair) => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;

                if (bodyA.label === 'pepe' && bodyB.label === 'pepe') {
                    const idxA = bodyA.plugin.levelIndex;
                    const idxB = bodyB.plugin.levelIndex;

                    if (idxA === idxB && idxA < EVOLUTION_LEVELS.length - 1) {
                        const midX = (bodyA.position.x + bodyB.position.x) / 2;
                        const midY = (bodyA.position.y + bodyB.position.y) / 2;

                        Composite.remove(world, [bodyA, bodyB]);

                        const nextIdx = idxA + 1;
                        const upgradedMeme = createMeme(midX, midY, nextIdx);

                        // Ekstrēms sprādziena grūdiens apvienojoties
                        const pushForce = 0.02;
                        Body.applyForce(upgradedMeme, upgradedMeme.position, {
                            x: (Math.random() - 0.5) * pushForce,
                            y: -pushForce
                        });

                        // Ekrāna kratīšana un punktu animācija
                        triggerScreenShake();
                        score += EVOLUTION_LEVELS[nextIdx].score;
                        const scoreDiv = document.getElementById('score');
                        const scoreBox = document.getElementById('score-box');
                        scoreDiv.innerText = score;
                        
                        scoreBox.classList.add('pulse');
                        setTimeout(() => scoreBox.classList.remove('pulse'), 100);

                        if (score > highScore) {
                            highScore = score;
                            document.getElementById('high-score').innerText = highScore;
                            localStorage.setItem('pepe_highscore', highScore);
                        }

                        setTimeout(() => {
                            Composite.add(world, upgradedMeme);
                        }, 10);
                    }
                }
            });
        });

        // EKSTRĒMI ĀTRS TAIMERIS: Zaudējumu pārbauda ik pēc 600ms
        setInterval(() => {
            const allBodies = Composite.allBodies(world);
            allBodies.forEach(body => {
                if (body.label === 'pepe' && body.position.y < 140 && body.velocity.y < 0.02) {
                    alert("NIGHTMARE OVER! Rezultāts: " + score);
                    score = 0;
                    document.getElementById('score').innerText = score;
                    
                    const toRemove = allBodies.filter(b => b.label === 'pepe');
                    Composite.remove(world, toRemove);
                }
            });
        }, 600);

    </script>
</body>
</html>
