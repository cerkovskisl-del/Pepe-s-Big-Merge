<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe's Big Merge - HARDCORE EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-dark: #05070a;
            --panel-bg: rgba(15, 20, 28, 0.9);
            --pepe-green: #39ff14;
            --neon-blue: #00f0ff;
            --neon-pink: #ff0055;
            --text-main: #ffffff;
            --text-muted: #627589;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 50% 0%, rgba(255, 0, 85, 0.08) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(57, 255, 20, 0.03) 0px, transparent 40%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #header-panel {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--neon-pink), #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 0, 85, 0.4));
        }

        .difficulty-badge {
            background: var(--neon-pink);
            color: #fff;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 10px;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .stats-container {
            display: flex;
            gap: 12px;
            background: var(--panel-bg);
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 0, 85, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .stat-box {
            text-align: center;
            min-width: 80px;
            transition: transform 0.15s ease;
        }

        .stat-box.pulse { transform: scale(1.15); }

        .stat-label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
        }

        #score { color: var(--pepe-green); }
        #next-name { color: var(--neon-blue); }
        #high-score { color: #ffcc00; }

        #game-wrapper {
            position: relative;
            padding: 6px;
            background: rgba(255, 0, 85, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.1);
        }

        #game-container {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: none;
        }

        #evolution-path {
            margin-top: 15px;
            background: var(--panel-bg);
            padding: 10px 15px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 380px;
            overflow-x: auto;
        }

        .evo-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 9px;
            min-width: 55px;
            text-align: center;
        }

        .evo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            margin-bottom: 4px;
        }

        .evo-arrow {
            color: var(--text-muted);
            font-size: 11px;
        }

        #danger-line {
            position: absolute;
            top: 130px; /* Nedaudz pazemināta līnija = mazāk vietas kļūdām */
            left: 6px;
            width: 380px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
            box-shadow: 0 0 10px var(--neon-pink);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="header-panel">
        <div class="difficulty-badge">Hardcore Mode</div>
        <h1>Pepe's Big Merge</h1>
        <div class="stats-container">
            <div class="stat-box" id="score-box">
                <div class="stat-label">Punkti</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box" style="border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08); padding: 0 10px; min-width: 110px;">
                <div class="stat-label">Nākamais</div>
                <div id="next-name" class="stat-value">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Labākais</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="danger-line"></div>
        <div id="game-container"></div>
    </div>

    <div id="evolution-path"></div>

    <script>
        // SAŠAURINĀTS LAUKUMS: No 450 uz 380 labākam izaicinājumam
        const WIDTH = 380;
        const HEIGHT = 640;
        
        const EVOLUTION_LEVELS = [
            { size: 22, score: 2, name: 'Kurkulis', img: 'pepe1.png', color: '#39ff14', glow: 'rgba(57, 255, 20, 0.2)' },
            { size: 32, score: 4, name: 'Krupis', img: 'pepe2.png', color: '#00f0ff', glow: 'rgba(0, 240, 255, 0.2)' },
            { size: 44, score: 8, name: 'Sad Pepe', img: 'pepe3.png', color: '#ff0055', glow: 'rgba(255, 0, 85, 0.2)' },
            { size: 56, score: 16, name: 'Chad Pepe', img: 'pepe4.png', color: '#ffcc00', glow: 'rgba(255, 204, 0, 0.2)' },
            { size: 72, score: 32, name: 'Monk Pepe', img: 'pepe5.png', color: '#b026ff', glow: 'rgba(176, 38, 255, 0.2)' },
            { size: 90, score: 64, name: 'Giga Chad', img: 'pepe6.png', color: '#ff5500', glow: 'rgba(255, 85, 0, 0.25)' }
        ];

        let highScore = localStorage.getItem('pepe_highscore') || 0;
        document.getElementById('high-score').innerText = highScore;

        const evoPathContainer = document.getElementById('evolution-path');
        EVOLUTION_LEVELS.forEach((lvl, idx) => {
            const step = document.createElement('div');
            step.className = 'evo-step';
            step.innerHTML = `
                <img class="evo-img" src="${lvl.img}" onerror="this.style.opacity='0.5';">
                <div style="color: ${lvl.color}; font-weight:600;">${lvl.name}</div>
            `;
            evoPathContainer.appendChild(step);
            if (idx < EVOLUTION_LEVELS.length - 1) {
                const arrow = document.createElement('div');
                arrow.className = 'evo-arrow';
                arrow.innerText = '➔';
                evoPathContainer.appendChild(arrow);
            }
        });

        const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
        const engine = Engine.create({ gravity: { y: 1.3 } }); // Nedaudz smagāka gravitācija fast-paced spēlei
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: WIDTH,
                height: HEIGHT,
                wireframes: false,
                background: '#080c12'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const wallOptions = { isStatic: true, render: { fillStyle: '#141c28' } };
        const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 8, WIDTH, 16, wallOptions);
        const leftWall = Bodies.rectangle(8, HEIGHT / 2, 16, HEIGHT, wallOptions);
        const rightWall = Bodies.rectangle(WIDTH - 8, HEIGHT / 2, 16, HEIGHT, wallOptions);
        Composite.add(world, [ground, leftWall, rightWall]);

        let score = 0;
        // GRŪTĀK: dod nejauši no pirmajiem TRĪS līmeņiem (Kurkulis, Krupis, Sad Pepe)
        let currentNextIndex = Math.floor(Math.random() * 3); 
        let canDrop = true;
        let mouseX = WIDTH / 2;

        updateNextPreview();

        function updateNextPreview() {
            const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
            const nameDiv = document.getElementById('next-name');
            nameDiv.innerText = nextLvl.name;
            nameDiv.style.color = nextLvl.color;
        }

        function createMeme(x, y, index) {
            const level = EVOLUTION_LEVELS[index];
            const targetWidth = level.size * 2;
            
            const meme = Bodies.circle(x, y, level.size, {
                restitution: 0.35, // GRŪTĀK: Palielināts atlēciens (bumbas lēkā uz augšu)
                friction: 0.08,
                label: 'pepe',
                plugin: { levelIndex: index, color: level.color, glow: level.glow },
                render: {
                    sprite: {
                        texture: level.img,
                        xScale: targetWidth / 250, 
                        yScale: targetWidth / 250
                    }
                }
            });

            const imgObj = new Image();
            imgObj.src = level.img;
            imgObj.onload = function() {
                const maxDimension = Math.max(this.width, this.height);
                meme.render.sprite.xScale = targetWidth / maxDimension;
                meme.render.sprite.yScale = targetWidth / maxDimension;
            };

            return meme;
        }

        document.getElementById('game-container').addEventListener('mousemove', (event) => {
            const rect = event.currentTarget.getBoundingClientRect();
            mouseX = event.clientX - rect.left;
            
            const currentSize = EVOLUTION_LEVELS[currentNextIndex].size;
            if (mouseX < 16 + currentSize) mouseX = 16 + currentSize;
            if (mouseX > WIDTH - 16 - currentSize) mouseX = WIDTH - 16 - currentSize;
        });

        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const bodies = Composite.allBodies(world);

            if (canDrop) {
                const nextLvl = EVOLUTION_LEVELS[currentNextIndex];
                context.save();
                context.beginPath();
                context.setLineDash([4, 4]);
                context.moveTo(mouseX, 70);
                context.lineTo(mouseX, HEIGHT - 16);
                context.strokeStyle = 'rgba(255, 0, 85, 0.2)';
                context.stroke();
                
                context.beginPath();
                context.arc(mouseX, 70, nextLvl.size, 0, 2 * Math.PI);
                context.fillStyle = nextLvl.glow;
                context.strokeStyle = nextLvl.color;
                context.lineWidth = 1.5;
                context.fill();
                context.stroke();
                context.restore();
            }

            bodies.forEach(body => {
                if (body.label === 'pepe') {
                    const index = body.plugin.levelIndex;
                    const size = EVOLUTION_LEVELS[index].size;
                    const color = body.plugin.color;
                    const glow = body.plugin.glow;

                    context.save();
                    context.beginPath();
                    context.arc(body.position.x, body.position.y, size - 1, 0, 2 * Math.PI);
                    context.fillStyle = glow;
                    context.strokeStyle = color;
                    context.lineWidth = 2.5;
                    context.shadowBlur = 8;
                    context.shadowColor = color;
                    context.fill();
                    context.stroke();
                    context.restore();
                }
            });
        });

        document.getElementById('game-container').addEventListener('click', () => {
            if (!canDrop) return;

            const newMeme = createMeme(mouseX, 70, currentNextIndex);
            
            // GRŪTĀK: Piešķir nejaušu rotāciju (griešanos) nomešanas brīdī
            const randomAngularVelocity = (Math.random() - 0.5) * 0.15;
            Body.setAngularVelocity(newMeme, randomAngularVelocity);
            
            Composite.add(world, newMeme);

            canDrop = false;
            currentNextIndex = Math.floor(Math.random() * 3); // Atkal izvēlas starp 3 sākuma līmeņiem
            updateNextPreview();

            setTimeout(() => { canDrop = true; }, 350); // Nedaudz ātrāks nākamais metiens
        });

        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;

            pairs.forEach((pair) => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;

                if (bodyA.label === 'pepe' && bodyB.label === 'pepe') {
                    const idxA = bodyA.plugin.levelIndex;
                    const idxB = bodyB.plugin.levelIndex;

                    if (idxA === idxB && idxA < EVOLUTION_LEVELS.length - 1) {
                        const midX = (bodyA.position.x + bodyB.position.x) / 2;
                        const midY = (bodyA.position.y + bodyB.position.y) / 2;

                        Composite.remove(world, [bodyA, bodyB]);

                        const nextIdx = idxA + 1;
                        const upgradedMeme = createMeme(midX, midY, nextIdx);

                        score += EVOLUTION_LEVELS[nextIdx].score;
                        const scoreDiv = document.getElementById('score');
                        const scoreBox = document.getElementById('score-box');
                        scoreDiv.innerText = score;
                        
                        scoreBox.classList.add('pulse');
                        setTimeout(() => scoreBox.classList.remove('pulse'), 150);

                        if (score > highScore) {
                            highScore = score;
                            document.getElementById('high-score').innerText = highScore;
                            localStorage.setItem('pepe_highscore', highScore);
                        }

                        setTimeout(() => {
                            Composite.add(world, upgradedMeme);
                        }, 15);
                    }
                }
            });
        });

        // GRŪTĀK: Zaudēšanas pārbaude ik pēc 1 sekundes (ātrāks game over)
        setInterval(() => {
            const allBodies = Composite.allBodies(world);
            allBodies.forEach(body => {
                if (body.label === 'pepe' && body.position.y < 130 && body.velocity.y < 0.03) {
                    alert("GAME OVER! Rezultāts: " + score);
                    score = 0;
                    document.getElementById('score').innerText = score;
                    
                    const toRemove = allBodies.filter(b => b.label === 'pepe');
                    Composite.remove(world, toRemove);
                }
            });
        }, 1000);

    </script>
</body>
</html>
